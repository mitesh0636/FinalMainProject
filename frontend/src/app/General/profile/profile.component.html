<div class="profile-container">
  <div class="profile-card">
    <div class="profile-header">
      <div class="avatar-circle">
        {{ UserDetail.name.charAt(0) || 'U' }}
      </div>
      <div class="header-text">
        <h2>{{UserDetail.name}}</h2>
        <p class="role-badge">Verified Customer</p>
      </div>
    </div>

    <div class="profile-body">
      <div class="info-grid">
        <div class="info-item">
          <label>Full Name</label>
          <p>{{ UserDetail.name }}</p>
        </div>

        <div class="info-item">
          <label>Email Address</label>
          <p>{{ UserDetail.email }}</p>
        </div>

        <div class="info-item">
          <label>Phone Number</label>
          <p>{{ UserDetail.contactno || 'Not Provided' }}</p>
        </div>

        <div class="info-item">
          <label>Date of Birth</label>
          <p>{{ UserDetail.dateofbirth | date:'mediumDate' }}</p>
        </div>

        <div class="info-item full-width">
          <label>Shipping Address</label>
          <p>{{ UserDetail.address || 'No address saved' }}</p>
        </div>
      </div>
    </div>

    <div class="profile-footer">
      <button class="update-btn" (click)="goupdate()">
        Update Profile
      </button>
    </div>
  </div>
</div>
