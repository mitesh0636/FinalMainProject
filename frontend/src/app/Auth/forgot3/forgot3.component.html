<div class="auth-wrapper">
  <div class="reset-card">
    <div class="card-header">
      <div class="success-icon">✓</div>
      <h2>पॉवरहाऊस <span>Reset</span></h2>
      <p>Identity verified. Please establish your new security key.</p>
    </div>

    <div class="auth-form">
      <div class="input-group">
        <label for="newPassword">New Password</label>
        <div class="input-wrapper">
          <input type="password" 
                 [(ngModel)]="newPassword" 
                 #new="ngModel" 
                 required 
                 minlength="8" 
                 maxlength="15">
        </div>
        @if(new.invalid && new.touched) {
          <small class="error-msg">Password must be 8-15 characters.</small>
        }
      </div>

      <div class="input-group">
        <label for="confirmPassword">Confirm Password</label>
        <div class="input-wrapper">
          <input type="password" 
                 [(ngModel)]="confirmPassword" 
                 #con="ngModel" 
                 required 
                 minlength="8" 
                 maxlength="15">
        </div>
        @if(confirmPassword && newPassword !== confirmPassword) {
          <small class="error-msg">Passwords do not match.</small>
        }
      </div>

      <div class="form-actions">
        <button class="reset-btn" 
                (click)="reset()" 
                [disabled]="(newPassword !== confirmPassword) || new.invalid">
          Update Password
        </button>
      </div>
    </div>
  </div>
</div>
